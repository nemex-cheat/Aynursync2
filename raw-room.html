<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aynur Sync - Raw Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark-900 text-white min-h-screen">
    <div class="max-w-lg mx-auto p-4">
        <div class="text-center py-8">
            <h1 class="text-3xl font-bold mb-2">Raw <span class="gradient-text-cyan">Room</span></h1>
            <p class="text-gray-400">Direkt video linkleri için hızlı oda</p>
        </div>

        <div class="glass rounded-2xl p-6 space-y-4">
            <div>
                <label class="text-xs text-gray-400 uppercase mb-2 block">Video URL</label>
                <input type="text" id="rawUrl" placeholder="https://site.com/video.mp4" 
                    class="w-full px-4 py-3 bg-dark-800 rounded-xl text-white outline-none">
            </div>
            <div>
                <label class="text-xs text-gray-400 uppercase mb-2 block">Oda Adı (Opsiyonel)</label>
                <input type="text" id="roomName" placeholder="Oda adı" 
                    class="w-full px-4 py-3 bg-dark-800 rounded-xl text-white outline-none">
            </div>
            <button onclick="createRawRoom()" class="w-full py-3 gradient-cyan rounded-xl font-bold text-white">
                Oda Kur ve İzle
            </button>
        </div>
    </div>

    <script src="anticrack.js"></script>
    <script>
        function createRawRoom() {
            const url = document.getElementById('rawUrl').value.trim();
            const name = document.getElementById('roomName').value.trim() || 'Raw Oda';

            if (!url) {
                alert('URL girin!');
                return;
            }

            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            localStorage.setItem('aynur_temp_room', JSON.stringify({ code, name, url }));
            window.location.href = 'watch.html?room=' + code + '&raw=' + encodeURIComponent(url);
        }
    </script>
</body>
</html>
