<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cupix369 - Sinema Modu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#0a0a0f', 800: '#12121a', 700: '#1a1a2e', 600: '#252542' },
                        accent: { 400: '#8b5cf6', 500: '#7c3aed', 600: '#6d28d9' },
                        neon: { blue: '#3b82f6', purple: '#a855f7', pink: '#ec4899' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0a0f; }
        .glass { background: rgba(26, 26, 46, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(139, 92, 246, 0.2); }
        .neon-glow { box-shadow: 0 0 20px rgba(139, 92, 246, 0.3); }
        .gradient-text { background: linear-gradient(135deg, #8b5cf6, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .video-container { position: relative; background: #000; border-radius: 16px; overflow: hidden; }
        .video-container video { width: 100%; height: auto; max-height: 70vh; }
        .controls-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 20px; opacity: 0; transition: opacity 0.3s; }
        .video-container:hover .controls-overlay { opacity: 1; }
        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; cursor: pointer; position: relative; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #8b5cf6, #ec4899); border-radius: 3px; width: 0%; transition: width 0.1s; }
        .chat-message { animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; }
        .typing-indicator { display: flex; gap: 4px; }
        .typing-dot { width: 6px; height: 6px; background: #8b5cf6; border-radius: 50%; animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        .reaction { animation: pop 0.3s ease; }
        @keyframes pop { 0% { transform: scale(0); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .sync-badge { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .volume-slider { -webkit-appearance: none; width: 80px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; outline: none; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: #8b5cf6; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body class="bg-dark-900 text-white min-h-screen">
    <!-- Top Bar -->
    <div class="glass fixed top-0 w-full z-50 px-4 py-3">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="index.html" class="text-gray-400 hover:text-white transition"><i class="fas fa-arrow-left"></i></a>
                <div class="w-8 h-8 bg-gradient-to-br from-accent-400 to-neon-pink rounded-lg flex items-center justify-center">
                    <i class="fas fa-play text-white text-sm"></i>
                </div>
                <div>
                    <span class="font-bold text-sm" id="roomTitle">Oda Adı</span>
                    <span class="text-xs text-gray-500 ml-2" id="roomCode">Kod: ---</span>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 px-3 py-1 bg-green-500/20 rounded-full sync-badge">
                    <div class="w-2 h-2 bg-green-500 rounded-full"></div>
                    <span class="text-xs text-green-400">Senkronize</span>
                </div>
                <div class="flex items-center gap-2 px-3 py-1 bg-dark-700 rounded-full">
                    <i class="fas fa-users text-accent-400 text-xs"></i>
                    <span class="text-xs" id="viewerCount">1 izleyici</span>
                </div>
                <button onclick="copyInviteLink()" class="px-3 py-1 bg-accent-500 rounded-lg text-sm hover:bg-accent-600 transition">
                    <i class="fas fa-share mr-1"></i>Davet
                </button>
                <button onclick="toggleFullscreen()" class="text-gray-400 hover:text-white">
                    <i class="fas fa-expand"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Main Layout -->
    <div class="pt-16 flex h-screen">
        <!-- Video Area -->
        <div class="flex-1 p-4 flex flex-col">
            <!-- Video Player -->
            <div class="video-container flex-1 mb-4 relative" id="videoContainer">
                <video id="videoPlayer" playsinline>
                    <source src="" type="video/mp4">
                    Tarayıcınız video oynatmayı desteklemiyor.
                </video>

                <!-- Center Play Button (when paused) -->
                <div id="centerPlay" class="absolute inset-0 flex items-center justify-center bg-black/50 cursor-pointer" onclick="togglePlay()">
                    <div class="w-20 h-20 bg-accent-500/80 rounded-full flex items-center justify-center hover:scale-110 transition">
                        <i class="fas fa-play text-3xl text-white ml-1"></i>
                    </div>
                </div>

                <!-- Controls -->
                <div class="controls-overlay">
                    <div class="progress-bar mb-3" id="progressBar" onclick="seek(event)">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <button onclick="togglePlay()" class="text-white hover:text-accent-400 transition">
                                <i class="fas fa-play text-xl" id="playIcon"></i>
                            </button>
                            <div class="flex items-center gap-2">
                                <button onclick="toggleMute()" class="text-white hover:text-accent-400">
                                    <i class="fas fa-volume-up" id="volumeIcon"></i>
                                </button>
                                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="100" oninput="setVolume(this.value)">
                            </div>
                            <span class="text-sm text-gray-400" id="timeDisplay">0:00 / 0:00</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <button onclick="skip(-10)" class="text-white hover:text-accent-400" title="-10s">
                                <i class="fas fa-undo-alt"></i>
                            </button>
                            <button onclick="skip(10)" class="text-white hover:text-accent-400" title="+10s">
                                <i class="fas fa-redo-alt"></i>
                            </button>
                            <button onclick="toggleFullscreen()" class="text-white hover:text-accent-400">
                                <i class="fas fa-expand"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Movie Info & Controls -->
            <div class="glass rounded-xl p-4">
                <div class="flex items-center justify-between">
                    <div>
                        <h2 class="text-xl font-bold" id="movieTitle">Film Seçilmedi</h2>
                        <p class="text-gray-400 text-sm" id="movieInfo">Film yüklemek için sağ paneli kullan</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="showLoadMovie()" class="px-4 py-2 bg-accent-500 rounded-lg hover:bg-accent-600 transition">
                            <i class="fas fa-film mr-2"></i>Film Yükle
                        </button>
                        <button onclick="syncNow()" class="px-4 py-2 glass rounded-lg hover:bg-dark-700 transition" title="Senkronize Et">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chat Sidebar -->
        <div class="w-80 glass border-l border-dark-600 flex flex-col">
            <div class="p-4 border-b border-dark-600">
                <h3 class="font-bold"><i class="fas fa-comments mr-2 text-accent-400"></i>Sohbet</h3>
            </div>

            <!-- Messages -->
            <div id="chatMessages" class="flex-1 overflow-y-auto p-4 space-y-3 scrollbar-hide">
                <!-- Messages will appear here -->
            </div>

            <!-- Typing Indicator -->
            <div id="typingIndicator" class="hidden px-4 py-2">
                <div class="flex items-center gap-2">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                    <span class="text-xs text-gray-500">Biri yazıyor...</span>
                </div>
            </div>

            <!-- Reactions -->
            <div class="px-4 py-2 border-t border-dark-600">
                <div class="flex gap-2 justify-center">
                    <button onclick="sendReaction('😂')" class="text-xl hover:scale-125 transition">😂</button>
                    <button onclick="sendReaction('😱')" class="text-xl hover:scale-125 transition">😱</button>
                    <button onclick="sendReaction('❤️')" class="text-xl hover:scale-125 transition">❤️</button>
                    <button onclick="sendReaction('🔥')" class="text-xl hover:scale-125 transition">🔥</button>
                    <button onclick="sendReaction('👏')" class="text-xl hover:scale-125 transition">👏</button>
                    <button onclick="sendReaction('😢')" class="text-xl hover:scale-125 transition">😢</button>
                </div>
            </div>

            <!-- Input -->
            <div class="p-4 border-t border-dark-600">
                <div class="flex gap-2">
                    <input type="text" id="chatInput" placeholder="Mesaj yaz..." 
                        class="flex-1 px-3 py-2 bg-dark-800 border border-dark-600 rounded-lg focus:border-accent-400 focus:outline-none text-sm"
                        onkeypress="if(event.key==='Enter')sendMessage()">
                    <button onclick="sendMessage()" class="px-3 py-2 bg-accent-500 rounded-lg hover:bg-accent-600 transition">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Load Movie Modal -->
    <div id="loadMovieModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="glass rounded-2xl p-6 max-w-lg w-full">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold">Film Yükle</h3>
                <button onclick="closeModal('loadMovieModal')" class="text-gray-400 hover:text-white"><i class="fas fa-times"></i></button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Film İsmi (AI arayacak)</label>
                    <div class="flex gap-2">
                        <input type="text" id="movieSearch" placeholder="Örn: Inception, The Matrix..." 
                            class="flex-1 px-4 py-3 bg-dark-800 border border-dark-600 rounded-xl focus:border-accent-400 focus:outline-none text-white">
                        <button onclick="searchMovie()" class="px-4 py-3 bg-accent-500 rounded-xl hover:bg-accent-600 transition">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                </div>
                <div class="relative">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-dark-600"></div></div>
                    <div class="relative flex justify-center"><span class="px-2 bg-dark-700 text-gray-500 text-sm">veya</span></div>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Direkt Video Linki (MP4, GitHub Raw, vb.)</label>
                    <input type="text" id="movieUrl" placeholder="https://..." 
                        class="w-full px-4 py-3 bg-dark-800 border border-dark-600 rounded-xl focus:border-accent-400 focus:outline-none text-white">
                </div>
                <div id="searchResults" class="hidden max-h-40 overflow-y-auto scrollbar-hide space-y-2">
                    <!-- Search results -->
                </div>
                <button onclick="loadMovie()" class="w-full py-3 bg-gradient-to-r from-accent-500 to-neon-pink rounded-xl font-semibold hover:scale-105 transition">
                    <i class="fas fa-play mr-2"></i>Film Yükle
                </button>
            </div>
        </div>
    </div>

    <!-- Invite Modal -->
    <div id="inviteModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="glass rounded-2xl p-6 max-w-md w-full text-center">
            <h3 class="text-xl font-bold mb-4">Davet Linki</h3>
            <p class="text-gray-400 text-sm mb-4">Arkadaşların bu linkle veya kodla katılabilir</p>
            <div class="bg-dark-800 rounded-xl p-4 mb-4">
                <p class="text-accent-400 font-mono text-lg" id="inviteCode">ABC123</p>
            </div>
            <div class="bg-dark-800 rounded-xl p-4 mb-4">
                <p class="text-gray-400 text-xs mb-1">Davet Linki</p>
                <p class="text-sm break-all" id="inviteLink">https://...</p>
            </div>
            <button onclick="copyToClipboard()" class="px-6 py-3 bg-accent-500 rounded-xl hover:bg-accent-600 transition">
                <i class="fas fa-copy mr-2"></i>Kopyala
            </button>
        </div>
    </div>

    <!-- Footer -->
    <div class="fixed bottom-0 w-full text-center py-2 bg-dark-900/80 text-gray-600 text-xs">
        © 2026 Cupix369 - Tüm Hakları Saklıdır
    </div>

    <script type="module" src="watch.js"></script>
</body>
</html>
