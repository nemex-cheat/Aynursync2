<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aynur Sync - İzleme Odası</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Nickname Modal -->
    <div class="modal-overlay" id="nicknameModal">
        <div class="modal">
            <h2>🎬 Aynur Sync</h2>
            <p>Beraber film izlemek için takma ad seç</p>
            <input type="text" class="input" id="nicknameInput" placeholder="Takma adın" maxlength="15" autocomplete="off">
            <button class="btn btn-primary" onclick="setNickname()">Başla 🚀</button>
        </div>
    </div>

    <!-- Header -->
    <header class="header">
        <a href="index.html" class="header-logo"><span>🎬</span>Aynur Sync</a>
        <div class="header-actions">
            <span class="btn btn-sm" id="userBadge" style="background:#e50914;color:#fff;border:none;">Misafir</span>
        </div>
    </header>

    <!-- Room Bar -->
    <div class="room-bar">
        <div class="room-info">
            <div class="room-code" id="roomCode" onclick="copyRoomCode()">ROOM: ...</div>
            <div class="online-badge">
                <div class="online-dot"></div>
                <span id="userCount">1 kişi</span>
            </div>
        </div>
        <div class="room-actions">
            <button class="btn btn-sm" style="background:linear-gradient(135deg,#8e44ad,#9b59b6);color:#fff;border:none;" onclick="toggleCheatMenu()">🎁</button>
            <div class="cheat-menu" id="cheatMenu">
                <div class="cheat-item" onclick="sendCheat('heart')"><span class="cheat-icon">❤️</span>Kalp Yağmuru</div>
                <div class="cheat-item" onclick="sendCheat('message')"><span class="cheat-icon">💌</span>Sürpriz Mesaj</div>
                <div class="cheat-item" onclick="sendCheat('hint')"><span class="cheat-icon">💡</span>Film İpucu</div>
                <div class="cheat-item" onclick="sendCheat('reaction')"><span class="cheat-icon">😍</span>Emoji Patlaması</div>
                <div class="cheat-item" onclick="sendCheat('love')"><span class="cheat-icon">🔥</span>Aşk Modu</div>
            </div>
            <button class="btn btn-sm btn-primary" onclick="shareRoom()">🔗</button>
            <button class="btn btn-sm" onclick="goHome()">🚪</button>
        </div>
    </div>

    <!-- Main Layout -->
    <div class="main-layout">
        <!-- Video -->
        <div class="video-section">
            <button class="new-video-btn" id="newVideoBtn" onclick="resetVideo()">🆕 Yeni Film</button>
            <div class="sync-indicator" id="syncIndicator">
                <div class="sync-dot" id="syncDot"></div>
                <span id="syncText">Senkronize</span>
            </div>
            <div class="video-container">
                <div class="video-wrapper">
                    <div class="video-overlay" id="videoOverlay">
                        <div class="start-screen">
                            <h2>🎬 Film Başlat</h2>
                            <p>Video linkini yapıştır</p>
                            <div class="source-tabs">
                                <div class="source-tab active" data-source="youtube" onclick="setVideoSource('youtube')">📺 YouTube</div>
                                <div class="source-tab" data-source="direct" onclick="setVideoSource('direct')">🌐 Direct</div>
                            </div>
                            <div class="input-group">
                                <input type="text" class="input" id="videoUrl" placeholder="YouTube URL..." autocomplete="off">
                                <button class="btn btn-primary" onclick="loadVideo()">▶️</button>
                            </div>
                            <div class="sample-buttons">
                                <button class="btn btn-sm" onclick="loadSample('jfKfPfyJRdk')">☕ Lo-Fi</button>
                                <button class="btn btn-sm" onclick="loadSample('M7lc1UVf-VE')">🎬 Trailer</button>
                                <button class="btn btn-sm" onclick="loadSample('LXb3EKWsInQ')">🌍 4K</button>
                            </div>
                        </div>
                    </div>
                    <div id="player"></div>
                </div>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        </div>

        <!-- Chat -->
        <div class="chat-section">
            <div class="chat-header">
                <h3>💬 Sohbet</h3>
                <span style="font-size:12px;color:#555;" id="typingStatus"></span>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="typing-indicator" id="typingIndicator">Birisi yazıyor...</div>
            <div class="chat-input-area">
                <button class="emoji-btn" onclick="toggleEmoji()">😊</button>
                <input type="text" class="chat-input" id="chatInput" placeholder="Mesaj yaz..." maxlength="200" onkeypress="handleKeyPress(event)" oninput="handleTyping()" autocomplete="off">
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <!-- Effects -->
    <div class="cheat-effect" id="cheatEffect"></div>
    <div class="cheat-popup" id="cheatPopup">
        <span class="emoji-big" id="cheatEmoji">❤️</span>
        <h3 id="cheatTitle">Sürpriz!</h3>
        <p id="cheatMessage">Mesaj</p>
        <button class="btn btn-primary" onclick="closeCheatPopup()">Tamam</button>
    </div>
    <button class="surprise-btn" onclick="quickSurprise()">💖</button>

    <!-- Toast -->
    <div class="toast" id="toast">
        <div class="toast-title" id="toastTitle">Bildirim</div>
        <div class="toast-msg" id="toastMsg">Mesaj</div>
    </div>

    <!-- Firebase v8 CDN -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="firebase-config.js"></script>
    <script src="anticrack.js"></script>
    <script src="app.js"></script>
</body>
</html>
