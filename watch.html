<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aynur Sync - Watch Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#0a0a0f', 800: '#12121a', 700: '#1a1a2e', 600: '#252542' },
                        accent: { cyan: '#06b6d4', blue: '#3b82f6', purple: '#8b5cf6', pink: '#ec4899' }
                    }
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0f; overflow: hidden; }
        .glass { background: rgba(26, 26, 46, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .video-container { position: relative; background: #000; width: 100%; }
        .video-container video { width: 100%; height: 100%; object-fit: contain; }
        .controls-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.9)); padding: 15px; opacity: 0; transition: opacity 0.3s; }
        .video-container:hover .controls-overlay, .video-container.show-controls .controls-overlay { opacity: 1; }
        .progress-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; cursor: pointer; position: relative; margin-bottom: 10px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #06b6d4, #3b82f6); border-radius: 2px; width: 0%; }
        .chat-message { animation: slideIn 0.25s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .user-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 11px; color: white; flex-shrink: 0; }
        .reaction-float { animation: floatUp 2s ease-out forwards; position: fixed; pointer-events: none; z-index: 100; }
        @keyframes floatUp { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 20% { transform: translateY(0) scale(1.2); opacity: 1; } 100% { transform: translateY(-150px) scale(1); opacity: 0; } }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .sync-pulse { animation: syncPulse 2s infinite; }
        @keyframes syncPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .btn-press:active { transform: scale(0.95); }
        .gradient-cyan { background: linear-gradient(135deg, #06b6d4, #3b82f6); }
        .neon-cyan { box-shadow: 0 0 15px rgba(6, 182, 212, 0.4); }
        @media (orientation: landscape) and (max-height: 500px) {
            .landscape-layout { flex-direction: row !important; }
            .landscape-video { flex: 1; height: 100vh; }
            .landscape-chat { width: 300px; height: 100vh; }
        }
    </style>
</head>
<body class="bg-dark-900 text-white h-screen flex flex-col">
    <!-- Top Bar -->
    <div class="glass px-4 py-2 flex items-center justify-between flex-shrink-0 z-50">
        <div class="flex items-center gap-2">
            <a href="index.html" class="w-8 h-8 glass rounded-lg flex items-center justify-center btn-press">
                <i class="fas fa-arrow-left text-sm"></i>
            </a>
            <div class="flex items-center gap-2">
                <svg viewBox="0 0 24 24" class="w-6 h-6">
                    <defs><linearGradient id="logo" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#06b6d4"/><stop offset="100%" style="stop-color:#ec4899"/></linearGradient></defs>
                    <polygon points="12,3 20,7 20,11 12,15 4,11 4,7" fill="none" stroke="url(#logo)" stroke-width="1.5"/>
                </svg>
                <div>
                    <div class="text-sm font-bold leading-tight" id="roomTitle">Oda</div>
                    <div class="text-xs text-gray-500" id="roomCode">Kod: ---</div>
                </div>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <div class="flex items-center gap-1 px-2 py-1 bg-green-500/20 rounded-full sync-pulse">
                <div class="w-1.5 h-1.5 bg-green-500 rounded-full"></div>
                <span class="text-xs text-green-400">Sync</span>
            </div>
            <div class="flex items-center gap-1 px-2 py-1 glass rounded-full">
                <i class="fas fa-users text-accent-cyan text-xs"></i>
                <span class="text-xs" id="viewerCount">1</span>
            </div>
            <button onclick="showInvite()" class="w-8 h-8 gradient-cyan rounded-lg flex items-center justify-center btn-press neon-cyan">
                <i class="fas fa-share-alt text-xs text-white"></i>
            </button>
        </div>
    </div>

    <!-- Main Layout -->
    <div class="flex-1 flex flex-col landscape-layout overflow-hidden">
        <!-- Video Area (Top) -->
        <div class="video-container landscape-video relative flex-shrink-0" id="videoContainer" style="height: 40vh;">
            <video id="videoPlayer" playsinline webkit-playsinline>
                <source src="" type="video/mp4">
            </video>

            <!-- Center Play -->
            <div id="centerPlay" class="absolute inset-0 flex items-center justify-center bg-black/40 cursor-pointer" onclick="togglePlay()">
                <div class="w-16 h-16 gradient-cyan rounded-full flex items-center justify-center btn-press">
                    <i class="fas fa-play text-xl text-white ml-1"></i>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls-overlay">
                <div class="progress-bar" id="progressBar" onclick="seek(event)">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <button onclick="togglePlay()" class="text-white btn-press">
                            <i class="fas fa-play" id="playIcon"></i>
                        </button>
                        <button onclick="toggleMute()" class="text-white btn-press">
                            <i class="fas fa-volume-up" id="volumeIcon"></i>
                        </button>
                        <span class="text-xs text-gray-400" id="timeDisplay">0:00 / 0:00</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="skip(-10)" class="text-white btn-press"><i class="fas fa-undo-alt text-xs"></i></button>
                        <button onclick="skip(10)" class="text-white btn-press"><i class="fas fa-redo-alt text-xs"></i></button>
                        <button onclick="toggleFullscreen()" class="text-white btn-press"><i class="fas fa-expand text-xs"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Movie Info Bar -->
        <div class="glass px-4 py-2 flex items-center justify-between flex-shrink-0">
            <div class="flex-1 min-w-0">
                <h3 class="text-sm font-bold truncate" id="movieTitle">Film Seçilmedi</h3>
                <p class="text-xs text-gray-400 truncate" id="movieInfo">Link yüklemek için butona bas</p>
            </div>
            <div class="flex gap-2 ml-2">
                <button onclick="showLoadMovie()" class="px-3 py-1.5 gradient-cyan rounded-lg text-xs font-semibold text-white btn-press">
                    <i class="fas fa-film mr-1"></i>Link
                </button>
                <button onclick="syncNow()" class="px-3 py-1.5 glass rounded-lg text-xs btn-press" title="Senkronize">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </div>

        <!-- Chat Area (Bottom) -->
        <div class="flex-1 flex flex-col landscape-chat glass border-t border-dark-600">
            <div class="px-3 py-2 border-b border-dark-600 flex items-center justify-between flex-shrink-0">
                <span class="text-xs font-bold text-gray-400"><i class="fas fa-comments mr-1 text-accent-cyan"></i>Sohbet</span>
                <div class="flex gap-1" id="viewerAvatars"></div>
            </div>

            <div id="chatMessages" class="flex-1 overflow-y-auto p-3 space-y-2 scrollbar-hide">
                <div class="text-center text-gray-600 text-xs py-4">Sohbet başladı...</div>
            </div>

            <!-- Reactions -->
            <div class="px-3 py-1 border-t border-dark-600 flex-shrink-0">
                <div class="flex gap-1 justify-center">
                    <button onclick="sendReaction('😂')" class="text-lg btn-press hover:scale-125 transition">😂</button>
                    <button onclick="sendReaction('😱')" class="text-lg btn-press hover:scale-125 transition">😱</button>
                    <button onclick="sendReaction('❤️')" class="text-lg btn-press hover:scale-125 transition">❤️</button>
                    <button onclick="sendReaction('🔥')" class="text-lg btn-press hover:scale-125 transition">🔥</button>
                    <button onclick="sendReaction('👏')" class="text-lg btn-press hover:scale-125 transition">👏</button>
                    <button onclick="sendReaction('😢')" class="text-lg btn-press hover:scale-125 transition">😢</button>
                </div>
            </div>

            <!-- Input -->
            <div class="p-2 border-t border-dark-600 flex-shrink-0">
                <div class="flex gap-2">
                    <input type="text" id="chatInput" placeholder="Mesaj yaz..." 
                        class="flex-1 px-3 py-2 bg-dark-800 rounded-xl text-sm outline-none text-white placeholder-gray-600"
                        onkeypress="if(event.key==='Enter')sendMessage()">
                    <button onclick="sendMessage()" class="w-10 h-10 gradient-cyan rounded-xl flex items-center justify-center btn-press neon-cyan">
                        <i class="fas fa-paper-plane text-white text-sm"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Load Movie Modal -->
    <div id="loadModal" class="fixed inset-0 z-50 hidden items-end justify-center">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeModal('loadModal')"></div>
        <div class="relative w-full glass-dark rounded-t-3xl p-5 max-h-[70vh] overflow-y-auto scrollbar-hide">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-bold">Video Yükle</h3>
                <button onclick="closeModal('loadModal')" class="w-8 h-8 glass rounded-lg flex items-center justify-center"><i class="fas fa-times"></i></button>
            </div>
            <div class="space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="setVideoType('youtube')" id="vtypeYoutube" class="glass rounded-xl p-3 text-center border-2 border-transparent">
                        <i class="fab fa-youtube text-xl text-red-500 mb-1"></i>
                        <p class="text-xs font-semibold">YouTube</p>
                    </button>
                    <button onclick="setVideoType('raw')" id="vtypeRaw" class="glass rounded-xl p-3 text-center border-2 border-transparent">
                        <i class="fas fa-link text-xl text-accent-cyan mb-1"></i>
                        <p class="text-xs font-semibold">Direkt Link</p>
                    </button>
                </div>
                <div id="youtubeDiv" class="hidden">
                    <label class="text-xs text-gray-400 mb-1 block">YouTube URL</label>
                    <input type="text" id="ytInput" placeholder="https://youtube.com/watch?v=..." class="w-full px-3 py-2 bg-dark-800 rounded-xl text-sm outline-none text-white">
                </div>
                <div id="rawDiv" class="hidden">
                    <label class="text-xs text-gray-400 mb-1 block">Direkt Video URL</label>
                    <input type="text" id="rawInput" placeholder="https://site.com/video.mp4" class="w-full px-3 py-2 bg-dark-800 rounded-xl text-sm outline-none text-white">
                </div>
                <button onclick="loadVideo()" class="w-full py-3 gradient-cyan rounded-xl font-bold text-white btn-press">Yükle</button>
            </div>
        </div>
    </div>

    <!-- Invite Modal -->
    <div id="inviteModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeModal('inviteModal')"></div>
        <div class="relative w-full max-w-sm glass-dark rounded-2xl p-5 text-center">
            <h3 class="text-lg font-bold mb-3">Davet Et</h3>
            <div class="glass rounded-xl p-3 mb-3">
                <p class="text-xs text-gray-400">Oda Kodu</p>
                <p class="text-xl font-mono font-bold text-accent-cyan" id="inviteCode">---</p>
            </div>
            <div class="glass rounded-xl p-3 mb-4">
                <p class="text-xs text-gray-400">Davet Linki</p>
                <p class="text-xs break-all mt-1" id="inviteLink">https://...</p>
            </div>
            <button onclick="copyInvite()" class="w-full py-3 gradient-cyan rounded-xl font-bold text-white btn-press">Kopyala</button>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed top-16 left-1/2 transform -translate-x-1/2 glass px-4 py-2 rounded-xl z-[60] hidden">
        <span id="toastText" class="text-sm font-semibold"></span>
    </div>

    <script src="anticrack.js"></script>
    <script src="watch.js"></script>
</body>
</html>
